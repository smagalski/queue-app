<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Queue</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      -webkit-user-select: none;
      cursor: default;
    }

    .container {
      width: 100%; height: 100%;
      background: rgba(11, 10, 15, 0.88);
      -webkit-backdrop-filter: blur(28px);
      backdrop-filter: blur(28px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Title bar ────────────────────────────────────────────────────────── */
    .title-bar {
      height: 30px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 7px;
      cursor: grab;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
    }
    .title-bar:active { cursor: grabbing; }
    /* All children must not capture the click so the title-bar div IS the target */
    .title-bar * { pointer-events: none; }

    .title-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: rgba(255,255,255,0.15); flex-shrink: 0;
    }
    .title-text {
      font-size: 9px; font-weight: 700; letter-spacing: 0.16em;
      text-transform: uppercase; color: rgba(255,255,255,0.25);
    }
    .title-hint {
      margin-left: auto;
      font-size: 8px; color: rgba(255,255,255,0.15);
    }

    /* ── Body ─────────────────────────────────────────────────────────────── */
    .body {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-height: 0;
    }

    /* ── Timeline ─────────────────────────────────────────────────────────── */
    .timeline-panel {
      width: 108px;
      flex-shrink: 0;
      border-right: 1px solid rgba(255,255,255,0.07);
      overflow: hidden;
      position: relative;
    }

    /* Static inner — sized by JS, no scroll */
    .timeline-inner {
      position: relative;
      margin: 0 5px;
    }

    .tl-hour {
      position: absolute;
      left: 0; right: 0;
      display: flex;
      align-items: flex-start;
      pointer-events: none;
    }
    .tl-label {
      width: 22px; flex-shrink: 0;
      font-size: 7px; font-weight: 600; letter-spacing: 0.03em;
      color: rgba(255,255,255,0.28); text-align: right;
      padding-right: 5px; margin-top: -4px; line-height: 1;
    }
    .tl-line {
      flex: 1; height: 1px;
      background: rgba(255,255,255,0.08);
    }

    .tl-block {
      position: absolute;
      left: 28px; right: 0;
      border-radius: 3px;
      padding: 1px 3px;
      overflow: hidden;
      pointer-events: none;
    }
    .tl-block-title {
      font-size: 6px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: rgba(255,255,255,0.7); line-height: 1.3;
    }

    .tl-now {
      position: absolute;
      left: 0; right: 0;
      height: 1.5px;
      background: #fff;
      z-index: 10;
      box-shadow: 0 0 5px rgba(255,255,255,0.5);
      pointer-events: none;
    }
    .tl-now::before {
      content: '';
      position: absolute;
      left: 20px; top: -3px;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 5px rgba(255,255,255,0.6);
    }

    /* ── Tasks ────────────────────────────────────────────────────────────── */
    .tasks-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 9px;
      overflow: hidden;
      padding: 10px 10px;
      cursor: pointer;
    }

    .slot-section { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; }

    .slot-label {
      font-size: 7px; font-weight: 700; letter-spacing: 0.16em;
      text-transform: uppercase; color: rgba(255,255,255,0.28);
      padding-left: 2px;
    }
    .slot-label.now { color: #f0d060; }

    .task-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 7px;
      padding: 7px 9px 6px;
      position: relative;
      overflow: hidden;
    }
    .task-card::before {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
      background: var(--bar, transparent);
    }
    .task-title {
      font-size: 11px; font-weight: 700;
      color: #fff; line-height: 1.3; margin-bottom: 5px;
    }
    .task-meta { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
    .badge {
      font-size: 7px; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; padding: 1px 5px; border-radius: 2px;
    }
    .empty-card {
      border: 1px dashed rgba(255,255,255,0.1);
      border-radius: 7px; padding: 10px;
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.15); font-size: 9px; font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title-bar" id="titleBar" data-tauri-drag-region>
      <div class="title-dot"></div>
      <span class="title-text">Queue</span>
      <span class="title-hint">click to open →</span>
    </div>
    <div class="body">
      <div class="timeline-panel" id="timelinePanel">
        <div class="timeline-inner" id="timelineInner"></div>
      </div>
      <div class="tasks-panel" id="tasksPanel"></div>
    </div>
  </div>

  <script>
    const P_COLORS = ['','#ff6b8a','#f0800f','#f0d060','#4caf87'];
    const P_LABELS = ['','URGENT','HIGH','MEDIUM','LOW'];

    function esc(s) {
      return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function isScheduled(t) {
      return t.type==='scheduled'||(!t.type&&(t.startTime||t.endTime));
    }
    function getSorted(tasks) {
      return tasks.filter(t=>!isScheduled(t)&&!t.isBreak).sort((a,b)=>{
        const ao=a.flexOrder??Infinity, bo=b.flexOrder??Infinity;
        if(ao!==bo) return ao-bo;
        if((a.priority||4)!==(b.priority||4)) return (a.priority||4)-(b.priority||4);
        return (a.addedAt||0)-(b.addedAt||0);
      });
    }
    function dateToMins(d){ return d.getHours()*60+d.getMinutes(); }
    function fmtTime(ms){
      const d=new Date(ms),h=d.getHours(),m=d.getMinutes();
      return `${h%12||12}:${String(m).padStart(2,'0')}${h>=12?'pm':'am'}`;
    }
    function fmtDur(mins){
      if(!mins) return '';
      return mins>=60?(mins%60?`${Math.floor(mins/60)}h${mins%60}m`:`${mins/60}h`):`${mins}m`;
    }

    // ── Timeline ─────────────────────────────────────────────────────────────

    function renderTimeline(tasks) {
      const panel     = document.getElementById('timelinePanel');
      const inner     = document.getElementById('timelineInner');
      const calStart  = parseInt(localStorage.getItem('q_calStart')||'360');
      const calEnd    = parseInt(localStorage.getItem('q_calEnd')||'1260');
      const panelH    = panel.clientHeight || 370;
      const pxPerMin  = panelH / (calEnd - calStart);
      const nowMins   = dateToMins(new Date());

      inner.style.height = panelH + 'px';

      function y(m){ return (m-calStart)*pxPerMin; }

      let html = '';

      // Hour rows — label every 2 hrs to avoid overlap at small scale
      for(let m=calStart; m<=calEnd; m+=60){
        const hr = Math.floor(m/60);
        const lbl = (m%120===0||m===calStart)
          ? (hr===0?'12a':hr<12?`${hr}a`:hr===12?'12p':`${hr-12}p`) : '';
        html += `<div class="tl-hour" style="top:${y(m)}px">
          <span class="tl-label">${lbl}</span><div class="tl-line"></div>
        </div>`;
      }

      // Scheduled task blocks
      for(const t of tasks){
        if(t.type==='scheduled'&&t.startTime){
          const s=dateToMins(new Date(t.startTime));
          const e=t.endTime?dateToMins(new Date(t.endTime)):s+(t.duration||60);
          if(e>calStart&&s<calEnd){
            const top=y(Math.max(s,calStart));
            const h=Math.max(4,(Math.min(e,calEnd)-Math.max(s,calStart))*pxPerMin);
            const col='#9863f3';
            html+=`<div class="tl-block" style="top:${top}px;height:${h}px;background:${col}22;border-left:2px solid ${col}">
              <span class="tl-block-title">${esc(t.title)}</span></div>`;
          }
        }
        // Active flex task (has calStartTime + duration)
        if(!isScheduled(t)&&t.calStartTime&&t.duration){
          const s=dateToMins(new Date(t.calStartTime));
          const e=s+t.duration;
          if(e>calStart&&s<calEnd){
            const top=y(Math.max(s,calStart));
            const h=Math.max(4,(Math.min(e,calEnd)-Math.max(s,calStart))*pxPerMin);
            const col=P_COLORS[t.priority||4];
            html+=`<div class="tl-block" style="top:${top}px;height:${h}px;background:${col}22;border-left:2px solid ${col}">
              <span class="tl-block-title">${esc(t.title)}</span></div>`;
          }
        }
      }

      // Current time line
      if(nowMins>=calStart&&nowMins<=calEnd){
        html+=`<div class="tl-now" id="tlNow" style="top:${y(nowMins)}px"></div>`;
      }

      inner.innerHTML = html;
    }

    function updateNowLine(){
      const calStart=parseInt(localStorage.getItem('q_calStart')||'360');
      const calEnd=parseInt(localStorage.getItem('q_calEnd')||'1260');
      const panel=document.getElementById('timelinePanel');
      const panelH=panel.clientHeight||370;
      const pxPerMin=panelH/(calEnd-calStart);
      const nowMins=dateToMins(new Date());
      const line=document.getElementById('tlNow');
      if(line&&nowMins>=calStart&&nowMins<=calEnd){
        line.style.top=((nowMins-calStart)*pxPerMin)+'px';
      }
    }

    // ── Task slots ────────────────────────────────────────────────────────────

    function renderSlot(task, lbl, isNow){
      const cls = isNow ? 'slot-label now' : 'slot-label';
      if(!task) return `<div class="slot-section">
        <div class="${cls}">${lbl}</div><div class="empty-card">—</div></div>`;
      const p=task.priority||4, col=P_COLORS[p]||'#fff';
      const tl=task.calStartTime?`started ${fmtTime(task.calStartTime)}`:'';
      const dl=fmtDur(task.duration);
      return `<div class="slot-section">
        <div class="${cls}">${lbl}</div>
        <div class="task-card" style="--bar:${col};border-color:${col}22">
          <div class="task-title">${esc(task.title)}</div>
          <div class="task-meta">
            <span class="badge" style="background:${col}22;color:${col}">${P_LABELS[p]}</span>
            ${tl?`<span class="badge" style="background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.5)">${tl}</span>`:''}
            ${dl?`<span class="badge" style="background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.5)">${dl}</span>`:''}
          </div>
        </div>
      </div>`;
    }

    // ── Render ────────────────────────────────────────────────────────────────

    function render(){
      try{
        const tasks=JSON.parse(localStorage.getItem('q_tasks')||'[]');
        const sorted=getSorted(tasks);
        renderTimeline(tasks);
        document.getElementById('tasksPanel').innerHTML=
          renderSlot(sorted[0],'NOW',true)+
          renderSlot(sorted[1],'UP NEXT',false)+
          renderSlot(sorted[2],'ON DECK',false);
      }catch(e){ console.error('Overlay render:',e); }
    }

    render();
    window.addEventListener('storage', render);
    setInterval(render, 10000);
    setInterval(updateNowLine, 60000);

    // ── Drag — call the same internal Tauri command that data-tauri-drag-region uses ──

    document.getElementById('titleBar').addEventListener('mousedown', (e) => {
      if(e.button !== 0) return;
      e.preventDefault();
      if(window.__TAURI_INTERNALS__){
        window.__TAURI_INTERNALS__.invoke('plugin:window|start_dragging');
      }
    });

    // ── Click tasks area → focus main window ─────────────────────────────────

    document.getElementById('tasksPanel').addEventListener('click', async () => {
      if(window.__TAURI__){
        try{ await window.__TAURI__.core.invoke('focus_main_window'); }
        catch(e){ console.error(e); }
      }
    });
  </script>
</body>
</html>
