<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Queue</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      /* Transparent so macOS vibrancy (NSVisualEffectView) shows through */
      background: transparent;
      overflow: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      -webkit-user-select: none;
      cursor: default;
    }

    .container {
      width: 100%; height: 100%;
      /* Subtle dark tint on top of the vibrancy layer */
      background: rgba(5, 4, 10, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Title bar (drag handle) ──────────────────────────────────────────── */
    .title-bar {
      height: 30px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      cursor: grab;
    }
    .title-bar:active { cursor: grabbing; }

    .title-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: rgba(255,255,255,0.2); flex-shrink: 0;
      pointer-events: none;
    }
    .title-text {
      font-size: 9px; font-weight: 700; letter-spacing: 0.18em;
      text-transform: uppercase; color: rgba(255,255,255,0.3);
      pointer-events: none;
    }
    .title-hint {
      margin-left: auto; font-size: 8px;
      color: rgba(255,255,255,0.18);
      pointer-events: none;
    }

    /* ── Body ─────────────────────────────────────────────────────────────── */
    .body {
      flex: 1; display: flex; overflow: hidden; min-height: 0;
    }

    /* ── Timeline ─────────────────────────────────────────────────────────── */
    .timeline-panel {
      width: 108px; flex-shrink: 0;
      border-right: 1px solid rgba(255,255,255,0.07);
      position: relative; overflow: hidden;
    }
    .timeline-inner {
      position: relative; margin: 0 5px;
    }
    .tl-hour {
      position: absolute; left: 0; right: 0;
      display: flex; align-items: flex-start; pointer-events: none;
    }
    .tl-label {
      width: 22px; flex-shrink: 0;
      font-size: 7px; font-weight: 600; letter-spacing: 0.03em;
      color: rgba(255,255,255,0.3); text-align: right;
      padding-right: 5px; margin-top: -4px; line-height: 1;
    }
    .tl-line { flex: 1; height: 1px; background: rgba(255,255,255,0.1); }

    .tl-block {
      position: absolute; left: 28px; right: 0;
      border-radius: 3px; padding: 1px 3px; overflow: hidden; pointer-events: none;
    }
    .tl-block-title {
      font-size: 6px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: rgba(255,255,255,0.75); line-height: 1.3;
    }
    .tl-now {
      position: absolute; left: 0; right: 0; height: 1.5px;
      background: #fff; z-index: 10;
      box-shadow: 0 0 5px rgba(255,255,255,0.6); pointer-events: none;
    }
    .tl-now::before {
      content: ''; position: absolute;
      left: 20px; top: -3px; width: 7px; height: 7px;
      border-radius: 50%; background: #fff;
      box-shadow: 0 0 5px rgba(255,255,255,0.7);
    }

    /* ── Tasks ────────────────────────────────────────────────────────────── */
    .tasks-panel {
      flex: 1; display: flex; flex-direction: column;
      gap: 9px; overflow: hidden;
      padding: 10px; cursor: pointer;
    }
    .slot-section { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; }
    .slot-label {
      font-size: 7px; font-weight: 700; letter-spacing: 0.16em;
      text-transform: uppercase; color: rgba(255,255,255,0.3); padding-left: 2px;
    }
    .slot-label.now { color: #f0d060; }

    .task-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 7px; padding: 7px 9px 6px;
      position: relative; overflow: hidden;
    }
    .task-card::before {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
      background: var(--bar, transparent);
    }
    .task-title {
      font-size: 11px; font-weight: 700;
      color: #fff; line-height: 1.3; margin-bottom: 5px;
    }
    .task-meta { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
    .badge {
      font-size: 7px; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; padding: 1px 5px; border-radius: 2px;
    }
    .empty-card {
      border: 1px dashed rgba(255,255,255,0.1); border-radius: 7px;
      padding: 10px; display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.18); font-size: 9px; font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title-bar" id="titleBar">
      <div class="title-dot"></div>
      <span class="title-text">Queue</span>
      <span class="title-hint">click to open →</span>
    </div>
    <div class="body">
      <div class="timeline-panel" id="timelinePanel">
        <div class="timeline-inner" id="timelineInner"></div>
      </div>
      <div class="tasks-panel" id="tasksPanel"></div>
    </div>
  </div>

  <script>
    const P_COLORS = ['','#ff6b8a','#f0800f','#f0d060','#4caf87'];
    const P_LABELS = ['','URGENT','HIGH','MEDIUM','LOW'];

    function esc(s) {
      return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function isScheduled(t) {
      return t.type==='scheduled'||(!t.type&&(t.startTime||t.endTime));
    }
    function getSorted(tasks) {
      return tasks.filter(t=>!isScheduled(t)&&!t.isBreak).sort((a,b)=>{
        const ao=a.flexOrder??Infinity, bo=b.flexOrder??Infinity;
        if(ao!==bo) return ao-bo;
        if((a.priority||4)!==(b.priority||4)) return (a.priority||4)-(b.priority||4);
        return (a.addedAt||0)-(b.addedAt||0);
      });
    }
    function dateToMins(d){ return d.getHours()*60+d.getMinutes(); }
    function fmtTime(ms){
      const d=new Date(ms),h=d.getHours(),m=d.getMinutes();
      return `${h%12||12}:${String(m).padStart(2,'0')}${h>=12?'pm':'am'}`;
    }
    function fmtDur(mins){
      if(!mins) return '';
      return mins>=60?(mins%60?`${Math.floor(mins/60)}h${mins%60}m`:`${mins/60}h`):`${mins}m`;
    }

    // Returns today's local date string as "YYYY-MM-DD"
    function todayStr() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    // Parse an ISO time string ("HH:MM" or "YYYY-MM-DDTHH:MM") to minutes since midnight
    function isoToMins(s) {
      if (!s) return null;
      const t = s.includes('T') ? s.split('T')[1] : s;
      const [h, m] = t.split(':').map(Number);
      return h * 60 + (m || 0);
    }

    // ── Timeline ─────────────────────────────────────────────────────────────

    function renderTimeline(tasks, doneTasks) {
      const panel    = document.getElementById('timelinePanel');
      const inner    = document.getElementById('timelineInner');
      const calStart = parseInt(localStorage.getItem('q_calStart')||'360');
      const calEnd   = parseInt(localStorage.getItem('q_calEnd')||'1260');
      const panelH   = panel.clientHeight || 370;
      const pxPerMin = panelH / (calEnd - calStart);
      const nowMins  = dateToMins(new Date());
      const today    = todayStr();
      inner.style.height = panelH + 'px';
      function y(m){ return (m - calStart) * pxPerMin; }

      function addBlock(title, s, e, col, done) {
        if (e <= calStart || s >= calEnd) return '';
        const top  = y(Math.max(s, calStart));
        const h    = Math.max(4, (Math.min(e, calEnd) - Math.max(s, calStart)) * pxPerMin);
        const bg   = done ? `${col}18` : `${col}22`;
        const opacity = done ? 'opacity:0.6;' : '';
        return `<div class="tl-block" style="top:${top}px;height:${h}px;${opacity}background:${bg};border-left:2px solid ${col}">
          <span class="tl-block-title">${esc(title)}</span></div>`;
      }

      let html = '';

      // Hour labels every 2 hrs
      for(let m = calStart; m <= calEnd; m += 60){
        const hr = Math.floor(m/60);
        const lbl = (m % 120 === 0 || m === calStart)
          ? (hr===0?'12a': hr<12?`${hr}a`: hr===12?'12p': `${hr-12}p`) : '';
        html += `<div class="tl-hour" style="top:${y(m)}px">
          <span class="tl-label">${lbl}</span><div class="tl-line"></div>
        </div>`;
      }

      // Completed tasks for today
      for(const t of doneTasks) {
        if (!t.startTime || !t.endTime) continue;
        if (!t.startTime.startsWith(today)) continue; // only today
        const s = isoToMins(t.startTime);
        const e = isoToMins(t.endTime);
        if (s === null || e === null || e <= s) continue;
        const col = t.isBreak ? '#9863f3' : (P_COLORS[t.priority||4] || '#fff');
        html += addBlock(t.title, s, e, col, true);
      }

      // Active scheduled tasks
      for(const t of tasks){
        if(t.type==='scheduled' && t.startTime){
          const s = isoToMins(t.startTime);
          const e = t.endTime ? isoToMins(t.endTime) : s+(t.duration||60);
          if (s !== null && e !== null) html += addBlock(t.title, s, e, '#9863f3', false);
        }
        // Currently running flex task
        if(!isScheduled(t) && t.calStartTime && t.duration){
          const s = dateToMins(new Date(t.calStartTime));
          html += addBlock(t.title, s, s + t.duration, P_COLORS[t.priority||4], false);
        }
      }

      // Now line
      if(nowMins >= calStart && nowMins <= calEnd){
        html += `<div class="tl-now" id="tlNow" style="top:${y(nowMins)}px"></div>`;
      }
      inner.innerHTML = html;
    }

    function updateNowLine(){
      const calStart = parseInt(localStorage.getItem('q_calStart')||'360');
      const calEnd   = parseInt(localStorage.getItem('q_calEnd')||'1260');
      const panel    = document.getElementById('timelinePanel');
      const panelH   = panel.clientHeight || 370;
      const pxPerMin = panelH / (calEnd - calStart);
      const nowMins  = dateToMins(new Date());
      const line = document.getElementById('tlNow');
      if(line && nowMins >= calStart && nowMins <= calEnd){
        line.style.top = ((nowMins - calStart) * pxPerMin) + 'px';
      }
    }

    // ── Task slots ────────────────────────────────────────────────────────────

    function renderSlot(task, lbl, isNow){
      const cls = isNow ? 'slot-label now' : 'slot-label';
      if(!task) return `<div class="slot-section">
        <div class="${cls}">${lbl}</div><div class="empty-card">—</div></div>`;
      const p = task.priority||4, col = P_COLORS[p]||'#fff';
      const tl = task.calStartTime ? `started ${fmtTime(task.calStartTime)}` : '';
      const dl = fmtDur(task.duration);
      return `<div class="slot-section">
        <div class="${cls}">${lbl}</div>
        <div class="task-card" style="--bar:${col};border-color:${col}22">
          <div class="task-title">${esc(task.title)}</div>
          <div class="task-meta">
            <span class="badge" style="background:${col}22;color:${col}">${P_LABELS[p]}</span>
            ${tl?`<span class="badge" style="background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.5)">${tl}</span>`:''}
            ${dl?`<span class="badge" style="background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.5)">${dl}</span>`:''}
          </div>
        </div>
      </div>`;
    }

    // ── Render ────────────────────────────────────────────────────────────────

    function render(){
      try{
        const tasks     = JSON.parse(localStorage.getItem('q_tasks')||'[]');
        const doneTasks = JSON.parse(localStorage.getItem('q_done') ||'[]');
        const sorted    = getSorted(tasks);
        renderTimeline(tasks, doneTasks);
        document.getElementById('tasksPanel').innerHTML =
          renderSlot(sorted[0],'NOW',true) +
          renderSlot(sorted[1],'UP NEXT',false) +
          renderSlot(sorted[2],'ON DECK',false);
      } catch(e){ console.error('Overlay render:',e); }
    }

    render();
    window.addEventListener('storage', render);
    setInterval(render, 10000);
    setInterval(updateNowLine, 60000);

    // ── Drag via delta IPC ────────────────────────────────────────────────────
    // Tauri's start_dragging() requires a live NSEvent on macOS (IPC latency
    // kills it). Instead we track delta on every mousemove and call move_overlay_by.

    let _dragActive = false;
    let _lastX = 0, _lastY = 0;

    document.getElementById('titleBar').addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      e.preventDefault();
      _dragActive = true;
      _lastX = e.screenX;
      _lastY = e.screenY;
    });

    window.addEventListener('mousemove', (e) => {
      if (!_dragActive || !window.__TAURI__) return;
      const scale = window.devicePixelRatio || 1;
      const dx = Math.round((e.screenX - _lastX) * scale);
      const dy = Math.round((e.screenY - _lastY) * scale);
      _lastX = e.screenX;
      _lastY = e.screenY;
      if (dx === 0 && dy === 0) return;
      // Fire-and-forget — fast enough for smooth drag on macOS IPC
      window.__TAURI__.core.invoke('move_overlay_by', { dx, dy }).catch(() => {});
    });

    window.addEventListener('mouseup', () => { _dragActive = false; });

    // ── Click tasks → focus main window ──────────────────────────────────────

    document.getElementById('tasksPanel').addEventListener('click', async () => {
      if (window.__TAURI__) {
        try { await window.__TAURI__.core.invoke('focus_main_window'); }
        catch(e){ console.error(e); }
      }
    });
  </script>
</body>
</html>
