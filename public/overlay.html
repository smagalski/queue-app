<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Queue</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      width: 100%; height: 100%;
      background: rgba(11, 10, 15, 0.85);
      -webkit-backdrop-filter: blur(24px);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Drag bar ─────────────────────────────────────────────────────────── */
    .drag-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px 10px;
      flex-shrink: 0;
      cursor: default;
      user-select: none;
    }

    .app-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.25);
    }

    .hint-label {
      font-size: 9px;
      letter-spacing: 0.05em;
      color: rgba(255, 255, 255, 0.18);
    }

    /* ── Divider ──────────────────────────────────────────────────────────── */
    .divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.07);
      flex-shrink: 0;
    }

    /* ── Scrollable content ───────────────────────────────────────────────── */
    .content {
      flex: 1;
      padding: 18px 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
      cursor: pointer;
    }

    .content::-webkit-scrollbar { display: none; }

    /* ── Slot section ─────────────────────────────────────────────────────── */
    .slot-section {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .slot-label {
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.3);
      padding-left: 2px;
    }

    .slot-label.now { color: #f0d060; }

    /* ── Task card ────────────────────────────────────────────────────────── */
    .task-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 13px 14px 11px;
      position: relative;
      overflow: hidden;
      transition: background 0.12s;
    }

    .task-card:hover { background: rgba(255, 255, 255, 0.08); }

    .task-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--bar, transparent);
    }

    .task-title {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
      margin-bottom: 9px;
    }

    .task-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .badge {
      font-size: 8px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 3px;
    }

    /* ── Empty card ───────────────────────────────────────────────────────── */
    .empty-card {
      border: 1px dashed rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 18px 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.18);
      font-size: 11px;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="drag-bar" data-tauri-drag-region>
      <span class="app-label" data-tauri-drag-region>Queue</span>
      <span class="hint-label" data-tauri-drag-region>click to open →</span>
    </div>
    <div class="divider"></div>
    <div class="content" id="content">
      <!-- Populated by JS -->
    </div>
  </div>

  <script>
    const P_COLORS = ['', '#ff6b8a', '#f0800f', '#f0d060', '#4caf87'];
    const P_LABELS = ['', 'URGENT', 'HIGH', 'MEDIUM', 'LOW'];

    function isScheduled(t) {
      return t.type === 'scheduled' || (!t.type && (t.startTime || t.endTime));
    }

    function getSorted(tasks) {
      return tasks
        .filter(t => !isScheduled(t) && !t.isBreak)
        .sort((a, b) => {
          const ao = a.flexOrder !== undefined ? a.flexOrder : Infinity;
          const bo = b.flexOrder !== undefined ? b.flexOrder : Infinity;
          if (ao !== bo) return ao - bo;
          const ap = a.priority || 4, bp = b.priority || 4;
          if (ap !== bp) return ap - bp;
          return (a.addedAt || 0) - (b.addedAt || 0);
        });
    }

    function fmtTime(ms) {
      const d = new Date(ms);
      const h = d.getHours(), m = d.getMinutes();
      const ampm = h >= 12 ? 'pm' : 'am';
      return `${h % 12 || 12}:${m.toString().padStart(2, '0')}${ampm}`;
    }

    function fmtDur(mins) {
      if (!mins) return '';
      return mins >= 60 ? `${mins / 60}h` : `${mins}m`;
    }

    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function renderSection(task, labelText, isNow) {
      const labelClass = isNow ? 'slot-label now' : 'slot-label';

      if (!task) {
        return `
          <div class="slot-section">
            <div class="${labelClass}">${labelText}</div>
            <div class="empty-card">—</div>
          </div>`;
      }

      const p   = task.priority || 4;
      const col = P_COLORS[p] || '#fff';
      const timeLabel = task.calStartTime ? `started ${fmtTime(task.calStartTime)}` : '';
      const durLabel  = fmtDur(task.duration);

      return `
        <div class="slot-section">
          <div class="${labelClass}">${labelText}</div>
          <div class="task-card" style="--bar:${col}; border-color:${col}22">
            <div class="task-title">${esc(task.title || 'Untitled')}</div>
            <div class="task-meta">
              <span class="badge" style="background:${col}22; color:${col}">${P_LABELS[p]}</span>
              ${timeLabel ? `<span class="badge" style="background:rgba(255,255,255,0.07); color:rgba(255,255,255,0.55)">${timeLabel}</span>` : ''}
              ${durLabel  ? `<span class="badge" style="background:rgba(255,255,255,0.07); color:rgba(255,255,255,0.55)">${durLabel}</span>` : ''}
            </div>
          </div>
        </div>`;
    }

    function render() {
      try {
        const raw   = localStorage.getItem('q_tasks');
        const tasks = raw ? JSON.parse(raw) : [];
        const sorted = getSorted(tasks);

        document.getElementById('content').innerHTML =
          renderSection(sorted[0], 'NOW',     true)  +
          renderSection(sorted[1], 'UP NEXT', false) +
          renderSection(sorted[2], 'ON DECK', false);
      } catch (e) {
        console.error('Overlay render error:', e);
      }
    }

    // Initial render
    render();

    // Stay in sync when main window writes to localStorage
    window.addEventListener('storage', render);

    // Polling fallback
    setInterval(render, 3000);

    // Click anywhere on the content area → bring main window to front
    document.getElementById('content').addEventListener('click', async () => {
      if (window.__TAURI__) {
        try {
          await window.__TAURI__.core.invoke('focus_main_window');
        } catch (e) {
          console.error('focus_main_window failed:', e);
        }
      }
    });
  </script>
</body>
</html>
